<!-- customer/edit_task.html -->
<h2>Edit Task</h2>
<form method="post">
    {% csrf_token %}
    <label>Title:</label><br>
    <input type="text" name="title" value="{{ task.title }}" required><br>
    
    <label>Description:</label><br>
    <textarea name="description">{{ task.description }}</textarea><br>
    
    <label>Due Date:</label><br>
    <input type="date" name="due_date" value="{{ task.due_date }}" required><br>
    
    <label>Completed:</label>
    <input type="checkbox" name="completed" {% if task.completed %}checked{% endif %}><br><br>
    
    <button type="submit">Update Task</button>
</form>
<a href="{% url 'task_list' customer_id %}">Back to Task List</a>
